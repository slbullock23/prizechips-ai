<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'" />
  <title>Blur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      border-radius: 12px;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 13px;
      color: #666;
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #222;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 0 40px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="logo">Blur</div>
  <div class="tagline">AI Chip Design Optimization</div>
  <div class="spinner"></div>
  <p id="status">Starting services…</p>
</body>
</html>
